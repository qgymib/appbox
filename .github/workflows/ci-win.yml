# This starter workflow is for a CMake project running on a single platform. There is a different starter workflow if you need cross-platform coverage.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-multi-platform.yml
name: ci-win

on: [push]

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release
  WX_INSTALL_DIR: ${{github.workspace}}/.deps/wxWidgets

jobs:
  build:
    # The CMake configure and build commands are platform agnostic and should work equally well on Windows or Mac.
    # You can convert this to a matrix build if you need cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Cache wxWidgets install
        id: cache-wxWidgets
        uses: actions/cache@v5
        with:
          path: ${{github.workspace}}/.deps/wxWidgets
          key: wxWidgets-${{runner.os}}-${{env.BUILD_TYPE}}-${{hashFiles('.git/modules/third_party/wxWidgets/HEAD')}}

      - name: Build wxWidgets
        if: steps.cache-wxWidgets.outputs.cache-hit != 'true'
        shell: cmd
        run: |
          cmake -S third_party/wxWidgets -B build-wxWidgets ^
            -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} ^
            -DCMAKE_INSTALL_PREFIX=${{github.workspace}}/.deps/wxWidgets ^
            -DwxBUILD_SHARED=OFF
          cmake --build build-wxWidgets --config ${{env.BUILD_TYPE}} --parallel
          cmake --install build-wxWidgets --config ${{env.BUILD_TYPE}}

      - name: Build
        env:
          CMAKE_PREFIX_PATH: ${{env.WX_INSTALL_DIR}}
        run: cmake --workflow --preset ${{env.BUILD_TYPE}}

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-logs
          path: ./build/test/Test-*

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          path: ./build/appbox-*.zip
          archive: false
